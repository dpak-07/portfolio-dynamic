name: Seed Projects And Tech Stack

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type SEED_PROJECTS_TECHSTACK to update projects/data and techStack/categories"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: seed-projects-techstack-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed:
    if: ${{ github.event.inputs.confirm == 'SEED_PROJECTS_TECHSTACK' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SEED_COLLECTIONS: projects,techStack
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase env
        shell: bash
        run: |
          required_vars=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets for seed.js:"
            printf ' - %s\n' "${missing_vars[@]}"
            exit 1
          fi

      - name: Check seed syntax
        run: node --check seed.js

      - name: Seed projects and tech stack
        run: npm run seed
