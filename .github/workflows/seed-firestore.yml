name: Seed Firestore From Seed JS

on:
  push:
    branches:
      - main
    paths:
      - seed.js
      - .github/workflows/seed-firestore.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-firestore
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Validate Firebase seed env
        shell: bash
        run: |
          required_vars=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets for seed.js:"
            printf ' - %s\n' "${missing_vars[@]}"
            exit 1
          fi

          echo "Firebase seed env looks valid"

      - name: Seed Firestore
        run: node seed.js
